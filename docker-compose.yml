services:
  jumal-worker:
    build: .
    container_name: mcp-jumal-worker
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount samples directory in strict Read-Only mode (ro)
      - ./malware_samples:/samples:ro
      # Add rules folder in Read-Only mode
      - ./yara_rules:/rules:ro
    # Resource limits (requirement from spec section 5. Security)
    mem_limit: 2g
    cpus: 2.0
    read_only: true
    tmpfs:
      - /tmp
    # Prevent container from gaining new privileges
    security_opt:
      - no-new-privileges:true
    # Drop all Linux capabilities for maximum isolation
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
