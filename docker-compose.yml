services:
  jumal-worker:
    build: .
    container_name: mcp-jumal-worker
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Монтируем директорию с семплами строго в режиме Read-Only (ro)
      - ./malware_samples:/samples:ro
      # Добавляем папку с правилами в режиме Read-Only
      - ./yara_rules:/rules:ro
    # Ограничения ресурсов (требование ТЗ по Security)
    mem_limit: 2g
    cpus: 2.0
    read_only: true
    tmpfs:
      - /tmp
    # Запрещаем контейнеру получать новые привилегии
    security_opt:
      - no-new-privileges:true
    # Сбрасываем все Linux capabilities для максимальной изоляции
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
